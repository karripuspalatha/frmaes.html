<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>

<body style="font-family:Arial;background-color:#f2f2f2;">

<form action="https://example.com/register"
      onsubmit="return validateForm()"
      style="width:350px;
             margin:50px auto;
             padding:20px;
             background:white;
             border:1px solid #ccc;
             border-radius:10px;">

    <h2 style="text-align:center;">Registration Form</h2>

    <label>Full Name:</label><br>
    <input type="text" id="name" style="width:100%;padding:8px;"><br><br>

    <label>Email Address:</label><br>
    <input type="email" id="email" style="width:100%;padding:8px;"><br><br>

    <label>Password:</label><br>
    <input type="password" id="password" style="width:100%;padding:8px;"><br><br>

    <label>Confirm Password:</label><br>
    <input type="password" id="confirm" style="width:100%;padding:8px;"><br><br>

    <label>Age:</label><br>
    <input type="number" id="age" style="width:100%;padding:8px;"><br><br>

    <input type="checkbox" id="news">
    <label>Subscribe to Newsletter</label><br><br>

    <input type="submit" value="Register"
           style="width:100%;
                  padding:10px;
                  background:green;
                  color:white;
                  border:none;
                  cursor:pointer;">

</form>

<script>
function validateForm() {

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;
    let age = document.getElementById("age").value;

    if (name == "") {
        alert("Full Name is required");
        return false;
    }

    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if (!email.match(emailPattern)) {
        alert("Enter a valid Email");
        return false;
    }

    if (password != confirm) {
        alert("Passwords do not match");
        return false;
    }

    if (age < 18 || age > 100) {
        alert("Age must be between 18 and 100");
        return false;
    }

    alert("Registration Successful!");
    return true;
}
</script>

</body>
</html>
